{% extends "shared/base.html" %}
{% load crispy_forms_tags %}

{% block body %}

<h4>Edit Organization</h4>
<form method="post" action="{% url 'edit_organization' form.instance.pk %}">
  {% csrf_token %}

  {{ form|crispy }}

  <p>
    <input type="submit" class="btn btn-primary" value="Update Organization" />
    <a href="{% url 'organization_list' %}" class="btn btn-secondary">Cancel</a>
  </p>
</form>

{% endblock %}
