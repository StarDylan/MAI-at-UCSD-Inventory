{% extends "shared/base.html" %} {% block body %}

{% load crispy_forms_tags %}
{% load static %}

<h4>Edit Stock Item</h4>
<p><strong>Item:</strong> {{ object.item.name }}</p>
<p><strong>Original Organization:</strong> {{ object.organization.name }}</p>

<form method="post">
  {% csrf_token %}

  {{ form|crispy }}

  <p>
    <input type="submit" class="btn btn-primary" value="Update Stock Item" />
    <a href="{% url 'view_item' object.item.id %}" class="btn btn-secondary">Cancel</a>
  </p>
</form>

<!-- Load GTIN processing scripts -->
{% load static %}
<script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
<script src="{% static 'inventory/js/gtin-parser.js' %}"></script>
<script src="{% static 'inventory/js/gtin-input-component.js' %}"></script>
<script src="{% static 'inventory/js/barcode-scanner.js' %}"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  // Initialize GTIN component with GS1 parsing and barcode scanning
  const gtinInput = document.getElementById("id_gtin");
  if (gtinInput) {
    const gtinComponent = new GTINInputComponent({
      gtinInput: gtinInput,
      lotInput: document.getElementById("id_lot_number"),
      expirationInput: document.getElementById("id_expiration_date"),
      onParsed: function(parsed) {
        console.log('GTIN parsed:', parsed);
      }
    });
  }
});
</script>

{% endblock %}
