{% extends "shared/base.html" %} {% block body %}

{% load crispy_forms_tags %}

<h4>Create Item</h4>
<form method="post" action="{% url 'create_item' %}">
  {% csrf_token %}

  {{ form|crispy }}

  <div class="form-group">
    <label for="new_organization_toggle">
      <input type="checkbox" id="new_organization_toggle"> Add new organization
    </label>
  </div>

  <!-- New organization form (hidden by default) -->
  <div id="new_organization_form" style="display: none;">
    <div class="card">
      <div class="card-header">
        <h6>Add New Organization</h6>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label for="new_org_name">Organization Name *</label>
          <input type="text" class="form-control" id="new_org_name" placeholder="e.g. Medical Supply Co.">
        </div>
        <div class="form-group">
          <label for="new_org_email">Contact Email</label>
          <input type="email" class="form-control" id="new_org_email" placeholder="orders@medicalsupply.com">
        </div>
        <div class="form-group">
          <label for="new_org_phone">Contact Phone</label>
          <input type="text" class="form-control" id="new_org_phone" placeholder="(555) 123-4567">
        </div>
        <div class="form-group">
          <label for="new_org_address">Address</label>
          <textarea class="form-control" id="new_org_address" rows="2" placeholder="Street address, city, state, zip"></textarea>
        </div>
        <div class="form-group">
          <label for="new_org_description">Description</label>
          <textarea class="form-control" id="new_org_description" rows="2" placeholder="Additional information about the organization"></textarea>
        </div>
        <button type="button" class="btn btn-success" id="add_organization_btn">Add Organization</button>
      </div>
    </div>
  </div>

  <p>
    <input type="submit" class="btn btn-primary" value="Create Item" />
  </p>
</form>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.getElementById('new_organization_toggle');
    const form = document.getElementById('new_organization_form');
    const addBtn = document.getElementById('add_organization_btn');
    const orgSelect = document.querySelector('select[name="organization"]');

    toggle.addEventListener('change', function() {
        form.style.display = this.checked ? 'block' : 'none';
    });

    addBtn.addEventListener('click', function() {
        const name = document.getElementById('new_org_name').value.trim();
        const email = document.getElementById('new_org_email').value.trim();
        const phone = document.getElementById('new_org_phone').value.trim();
        const address = document.getElementById('new_org_address').value.trim();
        const description = document.getElementById('new_org_description').value.trim();

        if (!name) {
            alert('Organization name is required');
            return;
        }

        // Send AJAX request to create organization
        fetch('{% url "organization_create_ajax" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({
                name: name,
                contact_email: email,
                contact_phone: phone,
                address: address,
                description: description
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Add new option to select
                const option = new Option(data.organization.name, data.organization.id, true, true);
                orgSelect.add(option);
                
                // Clear form
                document.getElementById('new_org_name').value = '';
                document.getElementById('new_org_email').value = '';
                document.getElementById('new_org_phone').value = '';
                document.getElementById('new_org_address').value = '';
                document.getElementById('new_org_description').value = '';
                
                // Hide form
                toggle.checked = false;
                form.style.display = 'none';
                
                alert('Organization added successfully!');
            } else {
                alert('Error: ' + data.error);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('An error occurred while creating the organization');
        });
    });
});
</script>

{% endblock %}
