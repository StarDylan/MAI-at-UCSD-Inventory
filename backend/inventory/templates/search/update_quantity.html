{% extends "shared/base.html" %}
{% load crispy_forms_tags %}

{% block body %}

<h4>{{ action }} an item</h4>

<body>

<script
  src="https://code.jquery.com/jquery-3.4.1.min.js"
  integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo="
  crossorigin="anonymous"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.10/css/select2.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.10/js/select2.min.js" defer></script>

<form method="POST">
    {% csrf_token %}
    <div class="form-group">
        {{ form.item|as_crispy_field }}
        {{ form.quantity|as_crispy_field }}
    </div>

    <p><input type="submit" class="btn btn-primary" value="Submit"></p>

</form>

{% if messages %}
  {% for message in messages %}
    <div class="alert alert-danger" role="alert">
        {{ message }}
    </div>
  {% endfor %}
{% endif %}

<script>
    $(document).ready(function() {
        $('#{{ form.item.id_for_label }}').select2({  // init Select2 on form's select field
            placeholder: "{{ form.item.label }}",
            allowClear: true,
            "box-sizing": "border-box",
            "width": "100%" 

        });
    });
</script>

{% endblock %}
