{% extends "shared/base.html" %} {% load crispy_forms_tags %} {% block body %}

<h4>{% if form.instance.pk %}Edit{% else %}Add{% endif %} Location</h4>

{% if messages %} {% for message in messages %}
<div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
  {{ message }}
  <button type="button" class="close" data-dismiss="alert" aria-label="Close">
    <span aria-hidden="true">&times;</span>
  </button>
</div>
{% endfor %} {% endif %}

<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %} {{ form|crispy }}

      <div class="mt-3">
        <button type="submit" class="btn btn-primary"><i class="material-icons">save</i> Save Location</button>
        <a href="{% url 'location_list' %}" class="btn btn-secondary"> <i class="material-icons">cancel</i> Cancel </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
